name: Meteora DLMM Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # setiap 5 menit
  workflow_dispatch:          # bisa trigger manual dari GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (single check)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          LPAGENT_API_KEY: ${{ secrets.LPAGENT_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          PNL_THRESHOLD: "3.0"
          CHECK_INTERVAL: "300"
        run: python main.py --once

      - name: Simpan state dan heartbeat ke repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Selalu update heartbeat agar repo tetap aktif (cegah throttle GitHub)
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > data/heartbeat.txt
          git add data/state.json data/heartbeat.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: bot heartbeat [skip ci]"
          git push || true

  # Job keepalive: re-enable workflow jika GitHub sempat menonaktifkannya
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-enable scheduled workflow
        run: |
          gh api -X PUT repos/${{ github.repository }}/actions/workflows/bot.yml/enable \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
